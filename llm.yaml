apiVersion: v1
kind: Namespace
metadata:
  name: llm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data-pvc
  namespace: llm
spec:
  storageClassName: spinning
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-pvc
  namespace: llm
spec:
  storageClassName: spinning
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data-pvc
  namespace: llm
spec:
  storageClassName: spinning
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm
spec:
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.4.1-rocm
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_MODELS
              value: /ollama-models
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "9.0.0"
            - name: OLLAMA_VULKAN
              value: "1"
          resources:
            requests:
              amd.com/gpu: "1"
            limits:
              amd.com/gpu: "1"
          securityContext:
            seccompProfile:
              type: Unconfined
          ports:
            - containerPort: 11434
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 5
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
            - name: ollama-models
              mountPath: /ollama-models
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data-pvc
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: llm
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: llm
spec:
  progressDeadlineSeconds: 1800
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          envFrom:
            - secretRef:
                name: open-webui-env
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama.llm.svc.cluster.local:11434
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
          volumeMounts:
            - name: open-webui-data
              mountPath: /app/backend/data
      volumes:
        - name: open-webui-data
          persistentVolumeClaim:
            claimName: open-webui-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: llm
spec:
  type: ClusterIP
  selector:
    app: open-webui
  ports:
    - name: http
      port: 3001
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: llm
spec:
  ingressClassName: traefik
  rules:
    - host: open-webui.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 3001