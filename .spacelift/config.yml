version: "2"
stack_defaults:
  # Required environment variables (set in Spacelift stack context or UI):
  #   k8s_public_hostname         - Cloudflare Access tunnel hostname (e.g. k8s.example.com)
  #   service_token_client_id     - Cloudflare Access service-token client ID
  #   service_token_client_secret - Cloudflare Access service-token client secret
  #   CF_TUNNEL_URL               - Local address to forward traffic to (default: localhost:6443)
  environment:
    CF_TUNNEL_URL: localhost:6443
    CLOUDFLARED_BIN: /tmp/cloudflared
    CLOUDFLARED_PID_FILE: /dev/shm/cloudflared.pid

  before_init:
    # Install cloudflared (pinned release; update script version + SHA256 together when upgrading).
    - bash .spacelift/scripts/install-cloudflared.sh
    # Validate required environment variables for Cloudflare Access auth.
    - bash .spacelift/scripts/validate-cloudflared-env.sh
    # Start cloudflared Access TCP tunnel before init and record its PID.
    - bash .spacelift/scripts/start-cloudflared-tunnel.sh

  after_run:
    # Terminate the background cloudflared tunnel and wait for it to exit.
    - bash .spacelift/scripts/stop-cloudflared-tunnel.sh

  # Ensure required app secrets exist after apply, once namespaces are created.
  after_apply:
    - bash .spacelift/scripts/bootstrap-secrets-llm.sh
    - bash .spacelift/scripts/bootstrap-secrets-paperless.sh
